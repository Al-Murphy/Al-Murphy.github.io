# Build and deploy Jekyll site to GitHub Pages
# - Fetches Genomics × AI blog posts before each build
# - Runs on push to main and daily (to keep blog list fresh)

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  schedule:
    # Run daily at 00:00 UTC to refresh blog list
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write   # write needed for the keepalive commit (see build job)
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch dynamic content
        run: |
          pip install -r scripts/requirements.txt
          python scripts/fetch_genomicsxai_blogs.py
          python scripts/fetch_tweets.py

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Add Linux platform to Gemfile.lock
        run: bundle lock --add-platform x86_64-linux

      - name: Install dependencies
        run: bundle install

      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --destination _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # GitHub disables scheduled workflows after 60 days with no repository
      # commits. On scheduled runs, make a tiny empty commit ~weekly (Mondays)
      # to reset that inactivity timer. The [skip ci] tag stops the resulting
      # push from triggering a redundant build/deploy.
      - name: Keepalive (reset scheduled-workflow inactivity timer)
        if: github.event_name == 'schedule'
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keepalive scheduled workflow [skip ci]"
            git push
          else
            echo "Not a keepalive day (only commits on Mondays); skipping."
          fi

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
